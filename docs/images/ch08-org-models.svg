  <circle cx="530" cy="82" r="12" fill="#2C5F8A"/><circle cx="580" cy="75" r="12" fill="#2C5F8A"/><circle cx="610" cy="110" r="12" fill="#2C5F8A"/><circle cx="530" cy="120" r="12" fill="#2C5F8A"/><circle cx="570" cy="100" r="8" fill="none" stroke="#2C5F8A" stroke-width="1"/>
