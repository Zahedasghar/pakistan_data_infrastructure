<svg viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="200" fill="#f0f4f8" rx="8"/>
  <text x="350" y="25" font-size="12" fill="#1B3A5C" text-anchor="middle" font-family="sans-serif" font-weight="700">ORGANISATIONAL MODELS — A SPECTRUM</text>
