  <rect x="40" y="50" width="180" height="100" rx="8" fill="white" stroke="#1B3A5C" stroke-width="1.5"/>
  <circle cx="130" cy="85" r="18" fill="#1B3A5C"/><text x="130" y="89" fill="white" font-size="8" text-anchor="middle" font-family="sans-serif">CBS</text>
  <circle cx="90" cy="120" r="8" fill="#dee2e6"/><circle cx="130" cy="130" r="8" fill="#dee2e6"/><circle cx="170" cy="120" r="8" fill="#dee2e6"/>
