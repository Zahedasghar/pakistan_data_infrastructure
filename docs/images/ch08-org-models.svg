  <rect x="260" y="50" width="180" height="100" rx="8" fill="white" stroke="#3D85C6" stroke-width="2"/>
  <circle cx="350" cy="82" r="16" fill="#3D85C6"/><text x="350" y="86" fill="white" font-size="7" text-anchor="middle" font-family="sans-serif">PBS</text>
  <circle cx="300" cy="115" r="12" fill="#2C5F8A"/><circle cx="350" cy="125" r="12" fill="#2C5F8A"/><circle cx="400" cy="115" r="12" fill="#2C5F8A"/>
