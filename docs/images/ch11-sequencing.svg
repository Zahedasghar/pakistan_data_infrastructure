<svg viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="200" fill="#f0f4f8" rx="8"/>
  <text x="350" y="25" font-size="12" fill="#1B3A5C" text-anchor="middle" font-family="sans-serif" font-weight="700">SEQUENCED PRIORITIES</text>
  <!-- Steps as connected stones -->
  <circle cx="90" cy="100" r="35" fill="#1B3A5C"/><text x="90" y="95" fill="white" font-size="8" text-anchor="middle" font-family="sans-serif" font-weight="600">Data</text><text x="90" y="107" fill="white" font-size="8" text-anchor="middle" font-family="sans-serif" font-weight="600">Inventory</text>
  <line x1="125" y1="100" x2="180" y2="100" stroke="#3D85C6" stroke-width="2"/>
  <polygon points="176,95 186,100 176,105" fill="#3D85C6"/>

  <circle cx="220" cy="100" r="35" fill="#2C5F8A"/><text x="220" y="95" fill="white" font-size="8" text-anchor="middle" font-family="sans-serif" font-weight="600">Pilot</text><text x="220" y="107" fill="white" font-size="8" text-anchor="middle" font-family="sans-serif" font-weight="600">Projects</text>
  <line x1="255" y1="100" x2="310" y2="100" stroke="#3D85C6" stroke-width="2"/>
  <polygon points="306,95 316,100 306,105" fill="#3D85C6"/>

  <circle cx="350" cy="100" r="35" fill="#3D85C6"/><text x="350" y="95" fill="white" font-size="8" text-anchor="middle" font-family="sans-serif" font-weight="600">Capacity</text><text x="350" y="107" fill="white" font-size="8" text-anchor="middle" font-family="sans-serif" font-weight="600">Building</text>
  <line x1="385" y1="100" x2="440" y2="100" stroke="#3D85C6" stroke-width="2"/>
  <polygon points="436,95 446,100 436,105" fill="#3D85C6"/>

  <circle cx="480" cy="100" r="35" fill="#2C5F8A"/><text x="480" y="95" fill="white" font-size="8" text-anchor="middle" font-family="sans-serif" font-weight="600">Legal</text><text x="480" y="107" fill="white" font-size="8" text-anchor="middle" font-family="sans-serif" font-weight="600">Reform</text>
  <line x1="515" y1="100" x2="570" y2="100" stroke="#3D85C6" stroke-width="2"/>
  <polygon points="566,95 576,100 566,105" fill="#3D85C6"/>

  <circle cx="610" cy="100" r="35" fill="#1B3A5C"/><text x="610" y="90" fill="white" font-size="7.5" text-anchor="middle" font-family="sans-serif" font-weight="600">Organi-</text><text x="610" y="102" fill="white" font-size="7.5" text-anchor="middle" font-family="sans-serif" font-weight="600">sational</text><text x="610" y="114" fill="white" font-size="7.5" text-anchor="middle" font-family="sans-serif" font-weight="600">Model</text>
  <text x="350" y="165" font-size="10" fill="#4a5568" text-anchor="middle" font-family="sans-serif" font-style="italic">Each step creates the conditions for the next</text>
  <text x="350" y="185" font-size="9" fill="#2C5F8A" text-anchor="middle" font-family="sans-serif" font-weight="600">Start small → Learn fast → Scale what works</text>
