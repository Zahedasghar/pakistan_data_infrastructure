<svg width="700" height="200" viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg">
  <defs><linearGradient id="blend" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#1B3A5C"/><stop offset="100%" style="stop-color:#3D85C6"/></linearGradient></defs>
  <rect width="700" height="200" fill="#f0f4f8" rx="8"/>
  <!-- Three source streams -->
  <rect x="40" y="30" width="140" height="40" rx="20" fill="#1B3A5C"/><text x="110" y="55" fill="white" font-size="10" text-anchor="middle" font-family="sans-serif">Surveys &amp; Censuses</text>
  <rect x="40" y="80" width="140" height="40" rx="20" fill="#2C5F8A"/><text x="110" y="105" fill="white" font-size="10" text-anchor="middle" font-family="sans-serif">Administrative Data</text>
  <rect x="40" y="130" width="140" height="40" rx="20" fill="#3D85C6"/><text x="110" y="155" fill="white" font-size="10" text-anchor="middle" font-family="sans-serif">Other Sources</text>
  <!-- Converging lines -->
  <path d="M180,50 Q280,50 350,100" fill="none" stroke="#1B3A5C" stroke-width="2"/>
  <path d="M180,100 L350,100" fill="none" stroke="#2C5F8A" stroke-width="2"/>
  <path d="M180,150 Q280,150 350,100" fill="none" stroke="#3D85C6" stroke-width="2"/>
  <!-- Central blend node -->
  <circle cx="380" cy="100" r="35" fill="url(#blend)" stroke="white" stroke-width="2"/>
  <text x="380" y="96" fill="white" font-size="9" text-anchor="middle" font-family="sans-serif" font-weight="700">BLENDED</text>
  <text x="380" y="109" fill="white" font-size="9" text-anchor="middle" font-family="sans-serif" font-weight="700">DATA</text>
  <!-- Output -->
  <line x1="415" y1="100" x2="490" y2="100" stroke="#3D85C6" stroke-width="2"/>
  <polygon points="490,93 505,100 490,107" fill="#3D85C6"/>
  <rect x="515" y="60" width="155" height="80" rx="8" fill="white" stroke="#3D85C6" stroke-width="1.5"/>
  <text x="592" y="88" fill="#1B3A5C" font-size="10" text-anchor="middle" font-family="sans-serif" font-weight="600">More timely</text>
  <text x="592" y="103" fill="#1B3A5C" font-size="10" text-anchor="middle" font-family="sans-serif" font-weight="600">More granular</text>
  <text x="592" y="118" fill="#1B3A5C" font-size="10" text-anchor="middle" font-family="sans-serif" font-weight="600">More comprehensive</text>
</svg>