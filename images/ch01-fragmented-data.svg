<svg width="700" height="200" viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B3A5C"/>
      <stop offset="100%" style="stop-color:#3D85C6"/>
    </linearGradient>
  </defs>
  <rect width="700" height="200" fill="#f0f4f8" rx="8"/>
  <!-- Scattered nodes (left side - fragmented) -->
  <circle cx="80" cy="60" r="18" fill="#1B3A5C" opacity="0.7"/>
  <circle cx="160" cy="130" r="14" fill="#2C5F8A" opacity="0.6"/>
  <circle cx="60" cy="150" r="12" fill="#3D85C6" opacity="0.5"/>
  <circle cx="180" cy="50" r="16" fill="#1B3A5C" opacity="0.5"/>
  <circle cx="120" cy="90" r="10" fill="#2C5F8A" opacity="0.4"/>
  <text x="130" y="190" font-size="10" fill="#4a5568" text-anchor="middle" font-family="sans-serif">Fragmented</text>
  <!-- Arrow -->
  <line x1="240" y1="100" x2="440" y2="100" stroke="#3D85C6" stroke-width="2" stroke-dasharray="8,4"/>
  <polygon points="440,92 460,100 440,108" fill="#3D85C6"/>
  <text x="350" y="85" font-size="11" fill="#2C5F8A" text-anchor="middle" font-family="sans-serif" font-weight="600">National Data Infrastructure</text>
  <!-- Connected nodes (right side - integrated) -->
  <circle cx="540" cy="70" r="18" fill="#1B3A5C"/>
  <circle cx="610" cy="50" r="14" fill="#2C5F8A"/>
  <circle cx="620" cy="130" r="16" fill="#3D85C6"/>
  <circle cx="540" cy="150" r="12" fill="#1B3A5C"/>
  <circle cx="580" cy="100" r="22" fill="url(#g1)" stroke="white" stroke-width="2"/>
  <line x1="540" y1="70" x2="580" y2="100" stroke="#dee2e6" stroke-width="1.5"/>
  <line x1="610" y1="50" x2="580" y2="100" stroke="#dee2e6" stroke-width="1.5"/>
  <line x1="620" y1="130" x2="580" y2="100" stroke="#dee2e6" stroke-width="1.5"/>
  <line x1="540" y1="150" x2="580" y2="100" stroke="#dee2e6" stroke-width="1.5"/>
  <text x="580" y="105" font-size="9" fill="white" text-anchor="middle" font-family="sans-serif" font-weight="700">PBS</text>
  <text x="580" y="190" font-size="10" fill="#4a5568" text-anchor="middle" font-family="sans-serif">Integrated</text>
</svg>