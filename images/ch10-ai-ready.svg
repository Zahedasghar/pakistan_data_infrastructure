<svg viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg">
  <defs><linearGradient id="ai_grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1B3A5C"/><stop offset="100%" style="stop-color:#3D85C6"/></linearGradient></defs>
  <rect width="700" height="200" fill="#f0f4f8" rx="8"/>
  <!-- FAIR blocks as foundation -->
  <rect x="100" y="130" width="120" height="45" rx="5" fill="#1B3A5C"/><text x="160" y="157" fill="white" font-size="10" text-anchor="middle" font-family="sans-serif" font-weight="700">Findable</text>
  <rect x="230" y="130" width="120" height="45" rx="5" fill="#2C5F8A"/><text x="290" y="157" fill="white" font-size="10" text-anchor="middle" font-family="sans-serif" font-weight="700">Accessible</text>
  <rect x="360" y="130" width="120" height="45" rx="5" fill="#3D85C6"/><text x="420" y="152" fill="white" font-size="9" text-anchor="middle" font-family="sans-serif" font-weight="700">Inter-</text><text x="420" y="164" fill="white" font-size="9" text-anchor="middle" font-family="sans-serif" font-weight="700">operable</text>
  <rect x="490" y="130" width="120" height="45" rx="5" fill="#1B3A5C"/><text x="550" y="157" fill="white" font-size="10" text-anchor="middle" font-family="sans-serif" font-weight="700">Reusable</text>
  <!-- AI-ready label on top -->
  <rect x="200" y="30" width="310" height="60" rx="30" fill="url(#ai_grad)" stroke="white" stroke-width="2"/>
  <text x="355" y="55" fill="white" font-size="14" text-anchor="middle" font-family="sans-serif" font-weight="700">AI-READY DATA</text>
  <text x="355" y="72" fill="rgba(255,255,255,0.8)" font-size="9" text-anchor="middle" font-family="sans-serif">Structured for machine consumption</text>
  <!-- Connection lines -->
  <line x1="250" y1="90" x2="160" y2="130" stroke="#dee2e6" stroke-width="1.2"/><line x1="310" y1="90" x2="290" y2="130" stroke="#dee2e6" stroke-width="1.2"/>
  <line x1="400" y1="90" x2="420" y2="130" stroke="#dee2e6" stroke-width="1.2"/><line x1="460" y1="90" x2="550" y2="130" stroke="#dee2e6" stroke-width="1.2"/>
  <text x="355" y="118" font-size="9" fill="#4a5568" text-anchor="middle" font-family="sans-serif" font-style="italic">The infrastructure is the binding constraint — not the algorithm</text>
</svg>