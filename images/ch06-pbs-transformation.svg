<svg width="700" height="200" viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg">
  <defs><linearGradient id="arrow_grad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#2C5F8A"/><stop offset="100%" style="stop-color:#3D85C6"/></linearGradient></defs>
  <rect width="700" height="200" fill="#f0f4f8" rx="8"/>
  <!-- Before -->
  <rect x="50" y="40" width="200" height="120" rx="8" fill="white" stroke="#dee2e6" stroke-width="1.5"/>
  <text x="150" y="65" fill="#1B3A5C" font-size="11" text-anchor="middle" font-family="sans-serif" font-weight="700">PBS Today</text>
  <text x="150" y="90" fill="#4a5568" font-size="9" text-anchor="middle" font-family="sans-serif">Data Collector</text>
  <text x="150" y="108" fill="#4a5568" font-size="9" text-anchor="middle" font-family="sans-serif">Surveys &amp; Censuses</text>
  <text x="150" y="126" fill="#4a5568" font-size="9" text-anchor="middle" font-family="sans-serif">Single-source outputs</text>
  <text x="150" y="144" fill="#4a5568" font-size="9" text-anchor="middle" font-family="sans-serif">Limited coordination</text>
  <!-- Arrow -->
  <rect x="280" y="85" width="140" height="30" rx="15" fill="url(#arrow_grad)"/>
  <text x="350" y="105" fill="white" font-size="10" text-anchor="middle" font-family="sans-serif" font-weight="600">TRANSFORM →</text>
  <!-- After -->
  <rect x="450" y="40" width="210" height="120" rx="8" fill="#1B3A5C"/>
  <text x="555" y="65" fill="white" font-size="11" text-anchor="middle" font-family="sans-serif" font-weight="700">PBS Tomorrow</text>
  <text x="555" y="90" fill="#5BA0DB" font-size="9" text-anchor="middle" font-family="sans-serif">National Data Coordinator</text>
  <text x="555" y="108" fill="rgba(255,255,255,0.85)" font-size="9" text-anchor="middle" font-family="sans-serif">Standards-setter</text>
  <text x="555" y="126" fill="rgba(255,255,255,0.85)" font-size="9" text-anchor="middle" font-family="sans-serif">Quality assurance</text>
  <text x="555" y="144" fill="rgba(255,255,255,0.85)" font-size="9" text-anchor="middle" font-family="sans-serif">Data steward</text>
</svg>