<svg viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg">
  <defs><linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#1B3A5C"/><stop offset="100%" style="stop-color:#2C5F8A"/></linearGradient></defs>
  <rect width="700" height="200" fill="#f0f4f8" rx="8"/>
  <!-- Shield -->
  <path d="M350,20 L410,50 L410,110 Q410,160 350,180 Q290,160 290,110 L290,50 Z" fill="url(#shield)" stroke="white" stroke-width="2"/>
  <text x="350" y="85" fill="white" font-size="10" text-anchor="middle" font-family="sans-serif" font-weight="700">ETHICS</text>
  <text x="350" y="100" fill="white" font-size="10" text-anchor="middle" font-family="sans-serif" font-weight="700">&amp; PRIVACY</text>
  <text x="350" y="120" fill="#5BA0DB" font-size="8" text-anchor="middle" font-family="sans-serif">Five Safes</text>
  <!-- Labels -->
  <text x="130" y="55" fill="#1B3A5C" font-size="9" text-anchor="middle" font-family="sans-serif" font-weight="600">Re-identification risk</text>
  <text x="130" y="85" fill="#2C5F8A" font-size="9" text-anchor="middle" font-family="sans-serif" font-weight="600">Social licence</text>
  <text x="130" y="115" fill="#3D85C6" font-size="9" text-anchor="middle" font-family="sans-serif" font-weight="600">Group privacy</text>
  <text x="130" y="145" fill="#4a5568" font-size="9" text-anchor="middle" font-family="sans-serif" font-weight="600">Proportionality</text>
  <text x="570" y="55" fill="#1B3A5C" font-size="9" text-anchor="middle" font-family="sans-serif" font-weight="600">Data minimisation</text>
  <text x="570" y="85" fill="#2C5F8A" font-size="9" text-anchor="middle" font-family="sans-serif" font-weight="600">Tiered access</text>
  <text x="570" y="115" fill="#3D85C6" font-size="9" text-anchor="middle" font-family="sans-serif" font-weight="600">Beneficence</text>
  <text x="570" y="145" fill="#4a5568" font-size="9" text-anchor="middle" font-family="sans-serif" font-weight="600">Dignity by design</text>
  <!-- Connecting dots -->
  <line x1="190" y1="52" x2="290" y2="60" stroke="#dee2e6" stroke-width="1"/><line x1="190" y1="82" x2="290" y2="80" stroke="#dee2e6" stroke-width="1"/>
  <line x1="190" y1="112" x2="290" y2="105" stroke="#dee2e6" stroke-width="1"/><line x1="190" y1="142" x2="290" y2="130" stroke="#dee2e6" stroke-width="1"/>
  <line x1="510" y1="52" x2="410" y2="60" stroke="#dee2e6" stroke-width="1"/><line x1="510" y1="82" x2="410" y2="80" stroke="#dee2e6" stroke-width="1"/>
  <line x1="510" y1="112" x2="410" y2="105" stroke="#dee2e6" stroke-width="1"/><line x1="510" y1="142" x2="410" y2="130" stroke="#dee2e6" stroke-width="1"/>
</svg>